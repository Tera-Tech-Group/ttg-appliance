---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
modules:
  - from-file: common.yml
  - type: systemd
    system:
      enabled:
        - init-tailscale.service
        - tailscaled.service
        - tayga.service
        - nat64dns.service
      disabled:
        - zincati.service
        - smb.service
        - watch-share.service
        - init-share.service
